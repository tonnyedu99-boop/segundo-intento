<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flores Amarillas 💛</title>

<style>
body {
  margin: 0;
  background: linear-gradient(to top, #ff4d88, #ff99cc);
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

/* Carta */
.card {
  background: #f5e6da;
  width: 320px;
  height: 420px;
  border-radius: 20px;
  position: relative;
  overflow: hidden;
}

/* Texto */
.texto {
  position: absolute;
  top: 20px;
  left: 20px;
  font-family: Arial;
  font-size: 14px;
}

/* Contador */
.timer {
  position: absolute;
  bottom: 10px;
  left: 10px;
  font-size: 12px;
  font-family: Arial;
}

/* Tronco */
.tronco {
  position: absolute;
  bottom: 0;
  left: 50%;
  width: 22px;
  height: 110px;
  background: #5c3b1e;
  transform: translateX(-50%);
  border-radius: 10px;
}

/* Ramas */
.rama {
  position: absolute;
  width: 70px;
  height: 8px;
  background: #5c3b1e;
  border-radius: 10px;
}

.rama.izq {
  bottom: 100px;
  left: 50%;
  transform: translateX(-100%) rotate(-35deg);
}

.rama.der {
  bottom: 100px;
  left: 50%;
  transform: rotate(35deg);
}

/* Flor */
.flor {
  position: absolute;
  width: 14px;
  height: 14px;
  background: yellow;
  border-radius: 50%;
  box-shadow:
    0 -6px 0 yellow,
    0 6px 0 yellow,
    6px 0 0 yellow,
    -6px 0 0 yellow,
    4px 4px 0 yellow,
    -4px -4px 0 yellow,
    -4px 4px 0 yellow,
    4px -4px 0 yellow;
}
</style>
</head>

<body>

<div class="card">
  <div class="texto">Mi amor por ti comenzó hace...</div>
  <div class="timer" id="timer"></div>

  <div class="tronco"></div>
  <div class="rama izq"></div>
  <div class="rama der"></div>
</div>

<script>
const card = document.querySelector(".card");

/* Corazón lleno con flores */
function crearCorazon() {
  for (let t = 0; t < Math.PI * 2; t += 0.02) {
    let x = 16 * Math.pow(Math.sin(t), 3);
    let y = -(13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t));

    // Relleno del corazón
    for (let i = 0; i < 6; i++) {
      let flor = document.createElement("div");
      flor.classList.add("flor");

      let offsetX = (Math.random() - 0.5) * 15;
      let offsetY = (Math.random() - 0.5) * 15;

      flor.style.left = (160 + x * 5 + offsetX) + "px";
      flor.style.top = (210 + y * 5 + offsetY) + "px";

      card.appendChild(flor);
    }
  }
}

crearCorazon();

/* Fecha */
const inicio = new Date("2024-02-18 00:00:00");

function actualizarTiempo() {
  const ahora = new Date();
  const diff = ahora - inicio;

  let dias = Math.floor(diff / (1000 * 60 * 60 * 24));
  let horas = Math.floor((diff / (1000 * 60 * 60)) % 24);
  let minutos = Math.floor((diff / (1000 * 60)) % 60);
  let segundos = Math.floor((diff / 1000) % 60);

  document.getElementById("timer").innerText =
    `${dias} días ${horas} horas ${minutos} minutos ${segundos} segundos`;
}

setInterval(actualizarTiempo, 1000);
</script>

</body>
</html>
